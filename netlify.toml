# Build configuration
[build]
  command = "npm run build"
  publish = "dist"

# 301 redirect — netlify.app to custom domain (prevents duplicate Google indexing)
# This MUST come FIRST before all other redirects
[[redirects]]
  from = "https://flexura.netlify.app/*"
  to = "https://flexura.in/:splat"
  status = 301
  force = true

# Serve robots.txt as real file — prevents SPA catch-all from blocking it
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

# Serve sitemap.xml as real file — prevents SPA catch-all from blocking it
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

# SPA catch-all — THIS MUST ALWAYS BE THE VERY LAST RULE
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
