# Build settings
[build]
  command = "npm run build"
  publish = "dist"

# Serve robots.txt as a real file — must come BEFORE the SPA catch-all
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

# Serve sitemap.xml as a real file — must come BEFORE the SPA catch-all
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

# SPA catch-all — MUST be the LAST redirect rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
